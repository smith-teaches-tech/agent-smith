name: analyze

# Phase 1.5-lite:
#   - Dropped the 17:00 AST (14:00 UTC) "US morning" run — cost saving.
#   - 22:00 AST (19:00 UTC) now passes --portfolio, triggering the paper-portfolio
#     decision pass (Haiku 4.5) alongside the main US/Taiwan analysis.
#   - 09:00 AST (06:00 UTC) Taiwan run unchanged.

on:
  schedule:
    # Taiwan morning pass (post Taipei close)           — 09:00 AST Mon-Fri
    - cron: "0 6 * * 1-5"
    # US afternoon + Taiwan refresh + portfolio pass    — 22:00 AST Mon-Fri
    - cron: "0 19 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which mode to run"
        required: true
        default: "all"
        type: choice
        options: ["us", "tw", "all"]
      portfolio:
        description: "Also run the portfolio decision pass"
        required: false
        default: false
        type: boolean

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # we commit JSON back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pick mode & flags for this run
        id: mode
        run: |
          # Default: workflow_dispatch inputs
          MODE="${{ github.event.inputs.mode }}"
          PORTFOLIO="${{ github.event.inputs.portfolio }}"
          # Override for scheduled runs based on cron expression
          CRON="${{ github.event.schedule }}"
          if [[ "$CRON" == "0 6 * * 1-5" ]]; then
            MODE="tw"
            PORTFOLIO="false"
          elif [[ "$CRON" == "0 19 * * 1-5" ]]; then
            MODE="all"
            PORTFOLIO="true"
          fi
          # Fallback for manual runs with no explicit mode
          if [ -z "$MODE" ]; then
            MODE="all"
          fi
          echo "mode=$MODE"           >> "$GITHUB_OUTPUT"
          echo "portfolio=$PORTFOLIO" >> "$GITHUB_OUTPUT"
          echo "Selected mode=$MODE portfolio=$PORTFOLIO"

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ steps.mode.outputs.portfolio }}" = "true" ]; then
            python -m agent.main "${{ steps.mode.outputs.mode }}" --portfolio
          else
            python -m agent.main "${{ steps.mode.outputs.mode }}"
          fi

      - name: Commit output
        run: |
          git config user.name  "agent-smith[bot]"
          git config user.email "agent-smith@users.noreply.github.com"
          git add docs/data/
          # --allow-empty avoids failing a run that produced no diff
          git commit -m "auto: ${{ steps.mode.outputs.mode }} run $(date -u +%Y-%m-%dT%H:%MZ) portfolio=${{ steps.mode.outputs.portfolio }}" --allow-empty
          git push
