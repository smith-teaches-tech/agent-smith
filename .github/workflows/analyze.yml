name: agent-smith analysis

on:
  schedule:
    # Times in UTC. AST = UTC+3 year-round (no DST in Saudi Arabia).
    # 09:00 AST = 06:00 UTC — Taiwan-focused (post Taipei close)
    - cron: "0 6 * * 1-5"
    # 17:00 AST = 14:00 UTC — US morning (30 min after NYSE open)
    - cron: "0 14 * * 1-5"
    # 22:00 AST = 19:00 UTC — US afternoon (1 hr before NYSE close)
    - cron: "0 19 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which analysis to run"
        required: true
        default: "all"
        type: choice
        options:
          - us
          - tw
          - all

permissions:
  contents: write   # needed to commit the updated JSON output

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # Determine mode based on which scheduled cron triggered this
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "06" ]; then
              echo "mode=tw" >> $GITHUB_OUTPUT
            else
              echo "mode=all" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent-smith
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agent.main ${{ steps.mode.outputs.mode }}

      - name: Commit updated analysis
        run: |
          git config user.name "agent-smith-bot"
          git config user.email "agent-smith@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Run ${{ steps.mode.outputs.mode }} analysis $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
